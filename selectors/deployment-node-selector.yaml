apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
  template:
    metadata:
      labels:
        project: roboshop
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3d-devops-lab-agent-2
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: nginx
          image: nginx:1.29.8
          resources:
            limits:
              cpu: "100m"
              memory: "100Mi"
            requests:
              cpu: "100m"
              memory: "100Mi"
      