apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  labels:
    project: roboshop
    component: database
    app: redis-cache
  namespace: roboshop
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: database
      app: redis-cache

  template:
    metadata:
      labels:
        project: roboshop
        component: database
        app: redis-cache
    spec:
      # tolerations:
      #   - key: env
      #     operator: Equal
      #     value: prod
      #     effect: NoSchedule
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: kubernetes.io/hostname
      #               operator: NotIn
      #               values:
      #                 - k3d-k3d-lab-cluster-agent-2-0-0

      # affinity:
      #     podAffinity:
      #       requiredDuringSchedulingIgnoredDuringExecution:
      #         - labelSelector:
      #             matchExpressions:
      #               - key: app
      #                 operator: In
      #                 values:
      #                   - backed
      #           topologyKey: kubernetes.io/hostname

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - redis-cache
              topologyKey: kubernetes.io/hostname

      containers:
        - name: cache
          image: nginx:1.29.8
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "64Mi"
              cpu: "250m"




