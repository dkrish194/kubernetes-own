apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  labels:
    project: ownshop
    component: frontend
  namespace: ownshop
  annotations:
    kubernetes.io/change-cause: "gree-rel-3"
spec:
  replicas: 3
  selector:
    matchLabels:
      project: ownshop
      component: frontend
  template:
    metadata:
      labels:
        project: ownshop
        component: frontend
    spec:
      containers:
        - name: python-app
          image: dkrish194/python-app:1.0.0
          env:
            - name: COLOR
              value: "green"
            - name: RELEASE
              value: "3"
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "64Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: python-app
  labels:
    project: ownshop
    component: frontend
  namespace: ownshop
spec:
  type: LoadBalancer
  selector:
      project: ownshop
      component: frontend
  ports:
    - port: 5000
      protocol: TCP
      targetPort: 5000




  