apiVersion: v1
kind: Service
metadata:
  name: python-app
  labels:
    project: roboshop
    component: frontend
    environment: dev
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    name: python-app
    environment: dev
  ports:
    - port: 5000
      protocol: TCP
      targetPort: 5000
