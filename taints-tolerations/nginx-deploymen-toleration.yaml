apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    component: frontend
  namespace: roboshop
  annotations:
    kubernetes.io/change-cause: "gree-rel-3"
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        component: frontend
        app: backed
    spec:
      tolerations:
        - key: env
          operator: Equal
          value: prod
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k3d-k3d-lab-cluster-agent-2-0-0
      containers:
        - name: nginx
          image: nginx:1.29.8
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "64Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    project: roboshop
    component: frontend
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
      project: roboshop
      component: frontend
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80




