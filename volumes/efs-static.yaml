# apiVersion: storage.k8s.io/v1
# kind: StorageClass
# metadata: 
#   name: efs-static
#   labels:
#     project: roboshop
#     teir: db
#     component: nginx
# provisioner: efs.csi.aws.com
apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-static
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  capacity: 
    storage: 1Gi
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0a0e9d02632606d87
  persistentVolumeReclaimPolicy: Retain
    
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-static
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  storageClassName: ""
  volumeName: efs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  volumes:
    - name: efs-static
      persistentVolumeClaim:
        claimName: efs-static
  containers:
    - name: nginx
      image: nginx:1.29.8
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
        requests:
          memory: "100Mi"
          cpu: "100m"
      volumeMounts:
        - name: efs-static
          mountPath: /mnt/data
        

