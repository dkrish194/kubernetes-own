apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  storageClassName: ""
  capacity:
    storage: "1Gi"
  accessModes:
    - ReadWriteOnce  
  csi:
    driver: csi.ebs.aws.com
    volumeHandle:  vol-01f9771fac9d25c59
    fsType: ext4
    
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "1Gi"
  volumeName: ebs-static

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    project: roboshop
    teir: db
    component: nginx
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
          memory: "100Mi"
          cpu: "100m"
    ports:
      - containerPort: 80
    volumeMounts:
      - mountPath: /etc/nginx/
        name: nginx-ebs-static
      
  volumes:
    - name: ebs-static
      persistentVolumeClaim:
        claimName: ebs-static



  

